<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">跑分和日常体验不同</title>
  <desc id="desc">跑分测试极限能力，日常使用多是短任务和零散读取</desc>
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">跑分很高，不等于每次点击都用满</text>
  <rect x="94" y="118" width="300" height="206" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
  <text x="244" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">跑分场景</text>
  <rect x="144" y="204" width="200" height="32" rx="16" fill="#2563eb"/>
  <rect x="144" y="254" width="200" height="32" rx="16" fill="#93c5fd"/>
  <text x="244" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">持续大流量测试</text>
  <rect x="506" y="118" width="300" height="206" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
  <text x="656" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f766e">日常场景</text>
  <g fill="#14b8a6">
    <rect x="556" y="205" width="44" height="26" rx="13"/>
    <rect x="620" y="205" width="88" height="26" rx="13"/>
    <rect x="728" y="205" width="28" height="26" rx="13"/>
    <rect x="556" y="257" width="70" height="26" rx="13"/>
    <rect x="650" y="257" width="48" height="26" rx="13"/>
  </g>
  <text x="656" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">短任务和零散读取</text>
</svg>
