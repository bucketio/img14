<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">固态硬盘速度与日常体感</title>
  <desc id="desc">展示高速参数和日常体感之间的差异</desc>
  <rect width="900" height="500" fill="#f7f5ee"/>
  <rect x="72" y="76" width="756" height="348" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="120" y="160" width="270" height="150" rx="18" fill="#1f2937"/>
  <rect x="150" y="190" width="210" height="22" rx="11" fill="#9ca3af"/>
  <rect x="150" y="230" width="150" height="22" rx="11" fill="#9ca3af"/>
  <circle cx="346" cy="276" r="14" fill="#f59e0b"/>
  <text x="255" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">7000MB/s</text>
  <path d="M440 250 C500 172 584 172 648 250" fill="none" stroke="#0f766e" stroke-width="16" stroke-linecap="round"/>
  <path d="M648 250 L620 234 M648 250 L636 218" fill="none" stroke="#0f766e" stroke-width="16" stroke-linecap="round"/>
  <text x="548" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f766e">跑分很快</text>
  <text x="548" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#334155">日常未必快一倍</text>
  <text x="450" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">固态硬盘为什么快很多，体感却差不多？</text>
</svg>
