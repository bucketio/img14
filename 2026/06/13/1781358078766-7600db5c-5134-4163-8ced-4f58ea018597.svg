<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">显示器选购场景清单</title>
  <desc id="desc">按办公学习、游戏电竞、设计修图、笔记本外接四类场景列出显示器选购重点。</desc>
  <rect width="1200" height="760" fill="#fffdf7"/>
  <text x="80" y="76" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#111827">不同用途，优先级完全不同</text>
  <text x="82" y="118" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" fill="#64748b">先定用途，再取舍参数，预算才不会花错地方。</text>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g transform="translate(80 175)">
      <rect width="500" height="210" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="44" cy="44" r="22" fill="#e0f2fe"/>
      <path d="M34 44 l7 7 l14 -16" fill="none" stroke="#0284c7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="52" font-size="29" font-weight="700" fill="#111827">办公学习</text>
      <text x="44" y="96" font-size="21" fill="#475569">优先：27 英寸 2K、支架可调、低反光</text>
      <text x="44" y="132" font-size="21" fill="#475569">够用：60Hz-100Hz，色彩正常即可</text>
      <text x="44" y="168" font-size="21" fill="#475569">避坑：只买大屏但分辨率太低</text>
    </g>
    <g transform="translate(620 175)">
      <rect width="500" height="210" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="44" cy="44" r="22" fill="#fee2e2"/>
      <path d="M35 51 l18 -18 M35 33 l18 18" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
      <text x="82" y="52" font-size="29" font-weight="700" fill="#111827">游戏电竞</text>
      <text x="44" y="96" font-size="21" fill="#475569">优先：高刷新率、低延迟、同步技术</text>
      <text x="44" y="132" font-size="21" fill="#475569">看显卡：能不能稳定跑到目标帧率</text>
      <text x="44" y="168" font-size="21" fill="#475569">避坑：响应时间只看 1ms 广告语</text>
    </g>
    <g transform="translate(80 430)">
      <rect width="500" height="230" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="44" cy="44" r="22" fill="#dcfce7"/>
      <path d="M33 49 c10 -24 24 -24 34 0" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
      <text x="82" y="52" font-size="29" font-weight="700" fill="#111827">设计修图</text>
      <text x="44" y="96" font-size="21" fill="#475569">优先：色域、色准、均匀性、4K 细腻度</text>
      <text x="44" y="132" font-size="21" fill="#475569">关注：sRGB / P3 覆盖和出厂校色</text>
      <text x="44" y="168" font-size="21" fill="#475569">建议：能看到真实评测更稳</text>
      <text x="44" y="204" font-size="21" fill="#475569">避坑：把“颜色鲜艳”当“颜色准确”</text>
    </g>
    <g transform="translate(620 430)">
      <rect width="500" height="230" rx="14" fill="#ffffff" stroke="#d9e2ec"/>
      <circle cx="44" cy="44" r="22" fill="#fef3c7"/>
      <rect x="32" y="34" width="24" height="18" rx="3" fill="none" stroke="#d97706" stroke-width="4"/>
      <path d="M29 58 h30" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
      <text x="82" y="52" font-size="29" font-weight="700" fill="#111827">笔记本外接</text>
      <text x="44" y="96" font-size="21" fill="#475569">优先：USB-C 一线连接、反向供电</text>
      <text x="44" y="132" font-size="21" fill="#475569">关注：接口带宽、供电瓦数、KVM</text>
      <text x="44" y="168" font-size="21" fill="#475569">建议：确认电脑支持的视频输出规格</text>
      <text x="44" y="204" font-size="21" fill="#475569">避坑：接口长得像，能力不一定一样</text>
    </g>
  </g>
</svg>
