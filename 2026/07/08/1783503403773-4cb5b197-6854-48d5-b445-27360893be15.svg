<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">固态硬盘预留空间封面</title>
  <desc id="desc">一块固态硬盘容量条显示已用空间和建议预留空间，强调20%不是硬性红线。</desc>
  <rect width="1200" height="675" fill="#f6f7fb"/>
  <rect x="90" y="78" width="1020" height="519" rx="34" fill="#ffffff" stroke="#d9deea" stroke-width="3"/>
  <text x="120" y="165" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#182033">固态硬盘必须预留 20% 吗？</text>
  <text x="122" y="216" font-family="Arial, sans-serif" font-size="26" fill="#5f6b80">20% 是经验值，不是每个人都必须死守的红线</text>
  <rect x="140" y="300" width="920" height="96" rx="22" fill="#e9edf5"/>
  <rect x="140" y="300" width="650" height="96" rx="22" fill="#3f7ee8"/>
  <rect x="790" y="300" width="110" height="96" fill="#f2b84b"/>
  <rect x="900" y="300" width="160" height="96" rx="22" fill="#52b788"/>
  <text x="190" y="360" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">已用空间</text>
  <text x="810" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3b2b00">紧张区</text>
  <text x="930" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">周转空间</text>
  <line x1="900" y1="284" x2="900" y2="420" stroke="#233044" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="850" y="462" font-family="Arial, sans-serif" font-size="24" fill="#233044">别长期接近满盘</text>
  <rect x="150" y="505" width="284" height="48" rx="24" fill="#edf5ff"/>
  <text x="181" y="537" font-family="Arial, sans-serif" font-size="21" fill="#2d5fa8">系统更新需要空间</text>
  <rect x="468" y="505" width="284" height="48" rx="24" fill="#fff5df"/>
  <text x="501" y="537" font-family="Arial, sans-serif" font-size="21" fill="#806016">缓存和临时文件会增长</text>
  <rect x="786" y="505" width="240" height="48" rx="24" fill="#e8f7ef"/>
  <text x="827" y="537" font-family="Arial, sans-serif" font-size="21" fill="#24704d">大容量不必死守20%</text>
</svg>
